name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      run_integration:
        description: Run integration tests
        required: false
        default: false
        type: boolean

jobs:
  unit:
    name: Validate and Unit Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run unit tests
        run: composer test:unit

  integration:
    name: Integration Tests (opt-in)
    runs-on: ubuntu-latest
    needs: unit
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.run_integration == true
    env:
      BBBSERVER_SYSTEMAPI_BASE_URL: ${{ secrets.BBBSERVER_SYSTEMAPI_BASE_URL }}
      BBBSERVER_SYSTEMAPI_KEY: ${{ secrets.BBBSERVER_SYSTEMAPI_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run integration tests
        run: composer test:integration